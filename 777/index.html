<!-- INTRODUÇÃO AO BOOTSTRAP -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="p-4">
    <!--toggler=menu hambúrguer/fw=font weight/fs=fontsize/ collapse=efeito de sanfona-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#">InovaWeb</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#servicos">Serviços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contato">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1>Olá Bootstrap!</h1>
    <p class="lead">Esse parágrafo já tem estilo Bootstrap.</p>
    <button class="btn btn-primary">Botão primário</button>
    <button class="btn btn-outline-warning">Botão outline</button>

    <div class="container mt-4">
        <div class="row">
            <div class="col-6 bg-primary">col-6</div>
            <div class="col-6 bg-success">col-6</div>
        </div>
    </div>
    <!--col = coluna / col-md(coluna média) / col-lg(coluna larga)/ bg=background-->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-3 bg-danger">col-4</div>
            <div class="col-12 col-md-6 col-lg-3 bg-warning">col-4</div>
            <div class="col-12 col-md-6 col-lg-3 bg-secondary">col-4</div>
            <div class="col-12 col-md-6 col-lg-3 bg-primary">col-4</div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row">
            <!-- Mobile: coluna única | Tablet: 2 col | Desktop: 4 col -->
            <div class="col-3 bg-primary">Card 1</div>
            <div class="col-2 bg-secondary">Card 2</div>
            <div class="col-1 bg-warning">Card 3</div>
            <!--Color=Muda a coloração das letras-->
            <div class="col-6 bg-danger" style="color:yellow"">Card 4</div>
    </div>
  </div>
<script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous">
                </script>
</body>

</html>
